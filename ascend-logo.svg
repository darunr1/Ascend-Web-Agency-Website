<svg xmlns="http://www.w3.org/2000/svg" viewBox="70 45 372 380" role="img" aria-labelledby="title">
  <title id="title">Ascend connected hexagon logo</title>
  <defs>
    <linearGradient id="hexFill" x1="86" y1="410" x2="322" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061a94"/>
      <stop offset="0.48" stop-color="#0a28d8"/>
      <stop offset="1" stop-color="#1f6cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.10 0 0 0 0 0.34 0 0 0 0 1 0 0 0 0.9 0" result="blueGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="hex" d="M0 -73 63 -36 63 36 0 73 -63 36 -63 -36Z"/>
  </defs>
  <g filter="url(#glow)" stroke="#2f7cff" stroke-width="5" stroke-linejoin="round">
    <path d="M256 182v94M256 276l-82 48M256 276l82 48" fill="none" stroke-linecap="round"/>
    <use href="#hex" transform="translate(256 128)" fill="url(#hexFill)"/>
    <use href="#hex" transform="translate(143 337)" fill="url(#hexFill)"/>
    <use href="#hex" transform="translate(369 337)" fill="url(#hexFill)"/>
  </g>
</svg>
